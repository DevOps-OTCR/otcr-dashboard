name: Deploy to QA (Frontend + Backend)

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  deploy-frontend:
    name: Deploy Frontend → Cloudflare Pages (QA)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend for Cloudflare (OpenNext adapter)
        working-directory: frontend
        run: npm run cf:build
        env:
          NEXT_PUBLIC_API_URL: https://otcr-backend-qa.meghp283.workers.dev
          NEXT_PUBLIC_APP_URL: https://cms-otcr-qa.pages.dev
          NEXT_MSAL_AUTHORITY: https://login.microsoftonline.com/44467e6f-462c-4ea2-823f-7800de5434e3
          NEXT_MSAL_CLIENT_ID: 294bcae4-d5c3-44e2-9e06-06cc230a9bfd
          NEXT_MSAL_REDIRECT_URI: https://cms-otcr-qa.pages.dev/auth/callback
          NEXT_PUBLIC_MSAL_POST_LOGOUT_REDIRECT_URI: https://cms-otcr-qa.pages.dev/sign-up
          # Add any other NEXT_PUBLIC_* vars your frontend needs

      - name: Deploy to Cloudflare Pages (QA)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: command: pages deploy frontend/.open-next/cloudflare --project-name=cms-otcr-qa

  deploy-backend:
    name: Deploy Backend → Cloudflare Worker (QA)
    runs-on: ubuntu-latest
    needs: deploy-frontend  # optional: ensures frontend deploys first

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Deploy Worker + Upload Secrets (QA environment)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./backend
          environment: qa  # Uses [env.qa] in wrangler.toml
          command: deploy
          secrets: |
            DATABASE_URL
            REDIS_URL  # only if used; expand as needed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_QA }}
          REDIS_URL: ${{ secrets.REDIS_URL_QA }}
          NODE_ENV: production
          FRONTEND_URL: https://cms-otcr-qa.pages.dev
          PORT: 8787  # ignored in Workers
