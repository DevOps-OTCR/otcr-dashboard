name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      GITHUB_PAGES: "true"
      # Custom domain deploy: serve from domain root, not /<repo>.
      NEXT_PUBLIC_BASE_PATH: ""
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_GOOGLE_CALENDAR_EMBED_URL: ${{ secrets.NEXT_PUBLIC_GOOGLE_CALENDAR_EMBED_URL }}
      NEXT_PUBLIC_MSAL_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_MSAL_CLIENT_ID }}
      NEXT_PUBLIC_MSAL_AUTHORITY: ${{ secrets.NEXT_PUBLIC_MSAL_AUTHORITY }}
      NEXT_PUBLIC_MSAL_REDIRECT_URI: ${{ secrets.NEXT_PUBLIC_MSAL_REDIRECT_URI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Validate required frontend env vars
        run: |
          test -n "$NEXT_PUBLIC_API_URL" || (echo "Missing NEXT_PUBLIC_API_URL" && exit 1)
          test -n "$NEXT_PUBLIC_MSAL_CLIENT_ID" || (echo "Missing NEXT_PUBLIC_MSAL_CLIENT_ID" && exit 1)
          test -n "$NEXT_PUBLIC_MSAL_AUTHORITY" || (echo "Missing NEXT_PUBLIC_MSAL_AUTHORITY" && exit 1)
          test -n "$NEXT_PUBLIC_MSAL_REDIRECT_URI" || (echo "Missing NEXT_PUBLIC_MSAL_REDIRECT_URI" && exit 1)

      - name: Build static export
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
